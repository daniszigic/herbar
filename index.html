<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbar Razreda</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; position: relative; border-top: 8px solid #2e7d32; }
        h2 { color: #2e7d32; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #2e7d32; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        #status { font-weight: bold; margin: 20px 0; padding: 15px; border-radius: 12px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .zauzeto { background: #ffebee; color: #c62828; }
        .slobodno { background: #e8f5e9; color: #2e7d32; }
        
        /* POPRAVLJEN SIDEBAR */
        .sidebar { 
            position: fixed; 
            top: 0; 
            right: -100%; 
            width: 320px; 
            height: 100vh; 
            background: white; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.2); 
            transition: 0.4s; 
            z-index: 100; 
            padding: 20px; 
            text-align: left; 
            overflow-y: auto; /* Omogućava skrolanje */
            box-sizing: border-box;
        }
        .sidebar.active { right: 0; }
        .menu-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #2e7d32; z-index: 101; }
        .close-btn { float: right; font-size: 30px; cursor: pointer; color: #999; line-height: 1; }
        
        .student-item { font-size: 14px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .student-name { font-weight: bold; display: block; color: #2e7d32; }
        .student-plants { color: #555; font-style: italic; }
        
        /* DODATNI PROSTOR NA DNU ZA ŠEJLU */
        #fullList { padding-bottom: 150px; }
    </style>
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
    <span class="close-btn" onclick="toggleMenu()">×</span>
    <h3>➕ Dodaj biljku</h3>
    <p style="font-size: 13px; color: #666;">Izaberi ime i unesi biljku:</p>
    
    <select id="studentName">
        <option>Adna Adorović</option><option>Aja Agić</option><option>Ajna Odobašić</option>
        <option>Amina Karić</option><option>Amna Delić Husić</option><option>Arman Varešlija</option>
        <option>Čamka Mehić</option><option>Danis Žigić</option><option>Davud Uzunović</option>
        <option>Edina Jusić</option><option>Eldar Hajdarević</option><option>Ema Avdić</option>
        <option>Emin Ređić</option><option>Emra Čajlaković</option><option>Hana Islambegović</option>
        <option>Hana Talić</option><option>Hena Čobo</option><option>Ilhan Hibić</option>
        <option>Iman Isaković</option><option>Iman Mahmutagić</option><option>Kerim Dedić</option>
        <option>Midhat Zildžić</option><option>Nadina Kahriman</option><option>Nejla Smriko</option>
        <option>Nejra Hazić</option><option>Sajra Čaluk</option><option>Sara Drapić</option>
        <option>Sara Kavaz</option><option>Šejla Halilović</option><option>Zejneb Doglod</option>
    </select>
    
    <input type="text" id="plantInput" placeholder="Naziv biljke...">
    <button onclick="savePlant()">SAČUVAJ NA SAJT</button>
    
    <hr>
    <h3>📋 Spisak zauzetih biljaka</h3>
    <div id="fullList">Učitavanje...</div>
</div>

<div class="card">
    <h2>🌿 Herbar Provjera</h2>
    <p>Provjeri je li biljka zauzeta:</p>
    <input type="text" id="search" placeholder="Kucaj naziv..." oninput="checkPlant()">
    <div id="status">Ukucaj naziv za provjeru</div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkgb1vgEgc-6X-M3rcf8tcBTDMgzVpZ61cU1kE8ieEC5VzwNNVdIS0aQ2swURPt3FBsQ/exec';
    let bazaPodataka = [];

    async function loadData() {
        try {
            const response = await fetch(scriptURL);
            const rawData = await response.json();
            const grupisano = {};
            rawData.forEach(item => {
                if(!grupisano[item.ime]) grupisano[item.ime] = [];
                item.biljka.split(',').forEach(b => { if(b.trim()) grupisano[item.ime].push(b.trim()); });
            });
            bazaPodataka = rawData; 
            const listDiv = document.getElementById('fullList');
            listDiv.innerHTML = "";
            for(let ime in grupisano) {
                listDiv.innerHTML += `<div class="student-item"><span class="student-name">${ime}</span><span class="student-plants">${grupisano[ime].join(", ")}</span></div>`;
            }
        } catch (e) { document.getElementById('fullList').innerHTML = "Greška u tabeli."; }
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function normalizuj(t) { return t.toLowerCase().trim().replace(/č/g,"c").replace(/ć/g,"c").replace(/š/g,"s").replace(/ž/g,"z").replace(/đ/g,"d"); }

    function checkPlant() {
        let unos = normalizuj(document.getElementById('search').value);
        let statusDiv = document.getElementById('status');
        if (!unos) { statusDiv.innerHTML = "Ukucaj naziv..."; statusDiv.className = ""; return; }
        let koJeUzeo = null;
        bazaPodataka.forEach(red => { if(red.biljka.split(',').some(b => normalizuj(b) === unos)) koJeUzeo = red.ime; });
        if (koJeUzeo) { statusDiv.innerHTML = `❌ ZAUZETO<br>Uzeo/la: ${koJeUzeo}`; statusDiv.className = "zauzeto"; }
        else { statusDiv.innerHTML = "✅ SLOBODNO"; statusDiv.className = "slobodno"; }
    }

    async function savePlant() {
        let ime = document.getElementById('studentName').value;
        let biljka = document.getElementById('plantInput').value.trim();
        if (!biljka) return alert("Upiši biljku!");
        alert("Spremanje u toku...");
        try {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ ime: ime, biljka: biljka }) });
            location.reload();
        } catch (e) { alert("Greška!"); }
    }
    loadData();
</script>
</body>
</html>
