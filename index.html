<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbar Razreda</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f1; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; position: relative; border-top: 8px solid #2e7d32; }
        h2 { color: #2e7d32; margin-top: 0; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #2e7d32; box-shadow: 0 0 8px rgba(46,125,50,0.2); }
        #status { font-size: 18px; font-weight: bold; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; transition: 0.3s; padding: 10px; border: 1px dashed #ccc; }
        .slobodno { color: #2e7d32; background: #e8f5e9; border: none !important; }
        .zauzeto { color: #c62828; background: #ffebee; border: none !important; }
        .vlasnik { font-size: 15px; font-weight: normal; margin-top: 8px; color: #444; background: rgba(255,255,255,0.5); padding: 4px 10px; border-radius: 20px; }

        /* Meni dugme */
        .menu-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 28px; color: #2e7d32; transition: 0.3s; }
        .menu-btn:hover { transform: scale(1.1); }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; right: -100%; width: 320px; height: 100%; background: white; box-shadow: -5px 0 20px rgba(0,0,0,0.2); transition: 0.4s cubic-bezier(0, 1, 0.5, 1); z-index: 99; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .sidebar h3 { color: #2e7d32; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; margin-top: 10px; }
        .student-item { margin-bottom: 12px; padding: 10px; border-radius: 8px; background: #f9f9f9; border-left: 4px solid #2e7d32; }
        .student-name { font-weight: bold; color: #222; display: block; font-size: 14px; }
        .student-plants { font-size: 12px; color: #666; margin-top: 3px; font-style: italic; }
        .close-btn { font-size: 35px; cursor: pointer; color: #bbb; float: right; line-height: 20px; }
        .close-btn:hover { color: #c62828; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2e7d32; border-radius: 10px; }
    </style>
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
    <span class="close-btn" onclick="toggleMenu()">×</span>
    <h3>📋 Spisak Razreda</h3>
    <div id="fullList"></div>
</div>

<div class="card">
    <h2>🌿 Herbar Provjera</h2>
    <p style="color: #666; font-size: 14px;">Provjeri da li je biljka zauzeta:</p>
    <input type="text" id="pretraga" placeholder="Kucaj naziv biljke..." oninput="checkPlant()">
    <div id="status">Ukucaj naziv za provjeru</div>
</div>

<script>
    // --- BAZA PODATAKA RAZREDA ---
    // Ovdje dopisuješ biljke unutar [" ", " "]
    const podaci = {
        "Adna Adorović": [],
        "Aja Agić": [],
        "Ajna Odobašić": [],
        "Amina Karić": [],
        "Amna Delić Husić": [],
        "Arman Varešlija": [],
        "Čamka Mehić": [],
        "Danis Žigić": ["Smokva", "Vejgela", "Žalfija", "Tamaris", "Bagrem"],
        "Davud Uzunović": [],
        "Edina Jusić": [],
        "Eldar Hajdarević": [],
        "Ema Avdić": [],
        "Emin Ređić": [],
        "Emra Čajlaković": [],
        "Hana Islambegović": [],
        "Hana Talić": [],
        "Hena Čobo": [],
        "Hibić Ilhan": [],
        "Iman Isaković": [],
        "Iman Mahmutagić": [],
        "Kerim Dedić": [],
        "Mithat Ziljić": [],
        "Nadina Kahraman": [],
        "Nejla Smriko": [],
        "Nejra Hazić": [],
        "Sajra Čaluk": [],
        "Sara Drapić": [],
        "Sara Kavaz": [],
        "Šejla Halilović": [],
        "Zejneb Doglod": []
    };

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    function normalizuj(t) {
        return t.toLowerCase().trim().replace(/č/g,"c").replace(/ć/g,"c").replace(/š/g,"s").replace(/ž/g,"z").replace(/đ/g,"d");
    }

    function checkPlant() {
        let unos = normalizuj(document.getElementById('pretraga').value);
        let statusDiv = document.getElementById('status');
        
        if (unos === "") {
            statusDiv.innerHTML = "Ukucaj naziv za provjeru";
            statusDiv.className = "";
            return;
        }

        let pronadjeno = false;
        let vlasnik = "";

        for (let ime in podaci) {
            if (podaci[ime].some(b => normalizuj(b) === unos)) {
                pronadjeno = true;
                vlasnik = ime;
                break;
            }
        }

        if (pronadjeno) {
            statusDiv.innerHTML = `<div>❌ ZAUZETO</div><div class="vlasnik">Biljku uzeo/la: <strong>${vlasnik}</strong></div>`;
            statusDiv.className = "zauzeto";
        } else {
            statusDiv.innerHTML = "✅ SLOBODNO";
            statusDiv.className = "slobodno";
        }
    }

    // Punjenje liste u sidebaru
    const fullListDiv = document.getElementById('fullList');
    for (let ime in podaci) {
        let item = document.createElement('div');
        item.className = 'student-item';
        let biljkeText = podaci[ime].length > 0 ? podaci[ime].join(", ") : "Još nema upisanih biljaka";
        item.innerHTML = `<span class="student-name">${ime}</span>
                          <span class="student-plants">${biljkeText}</span>`;
        fullListDiv.appendChild(item);
    }
</script>

</body>
</html>
